---
version: "3.9"

services:
  zookeeper:
    platform: linux/amd64
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: unless-stopped
    ports:
      - '32181:32181'
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 32181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper:2888:3888
    healthcheck:
      test: echo stat | nc localhost 32181
      interval: 10s
      timeout: 10s
      retries: 3
    networks:
      - kafka

  broker1:
    platform: linux/amd64
    image: confluentinc/cp-kafka:7.4.0
    container_name: broker1
    restart: unless-stopped
    ports:
      - '9091:9091'
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:32181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker1:29091,EXTERNAL://localhost:9091
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
    healthcheck:
      test: nc -vz localhost 9091
      interval: 10s
      timeout: 10s
      retries: 3
    networks:
      - kafka

  broker2:
    platform: linux/amd64
    image: confluentinc/cp-kafka:7.4.0
    container_name: broker2
    restart: unless-stopped
    ports:
      - '9092:9092'
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:32181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker2:29092,EXTERNAL://localhost:9092
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
    healthcheck:
      test: nc -vz localhost 9092
      interval: 10s
      timeout: 10s
      retries: 3
    networks:
      - kafka

  kafka-ui:
    container_name: kafka-ui 
    image: provectuslabs/kafka-ui:latest
    ports:
      - 8087:8080
    depends_on:
      - broker1
      - broker2
    environment:
      KAFKA_CLUSTERS_0_NAME: lab-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker1:29091,broker2:29092
      DYNAMIC_CONFIG_ENABLED: 'true'
    networks:
      - kafka

  producer:
    platform: linux/amd64
    container_name: producer
    build:
      context: ./producer
      dockerfile: Dockerfile
    restart: always
    environment:
      - BOOTSTRAP_SERVERS=broker1:29091,broker2:29092
      - CSV_FILE_PATH=/app/data/Divvy_Trips_2019_Q4.csv
      - PYTHONUNBUFFERED=1
    volumes:
      - ./Divvy_Trips_2019_Q4.csv:/app/data/Divvy_Trips_2019_Q4.csv
    networks:
      - kafka
    depends_on:
      broker1:
        condition: service_healthy
      broker2:
        condition: service_healthy

  consumer:
    platform: linux/amd64
    container_name: consumer
    build:
      context: ./consumer
      dockerfile: Dockerfile
    restart: always
    environment:
      - BOOTSTRAP_SERVERS=broker1:29091,broker2:29092
      - TOPIC=Topic1
      - CONSUMER_GROUP=lab3-group
      - PYTHONUNBUFFERED=1
    networks:
      - kafka
    depends_on:
      broker1:
        condition: service_healthy
      broker2:
        condition: service_healthy

networks:
  kafka:
    name: kafka


# docker-compose up --build -d
# docker-compose down
# docker-compose logs broker1
# docker-compose logs broker2
# docker-compose logs producer
# docker-compose logs consumer